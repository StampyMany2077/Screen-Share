<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Live Screen Share</title>
    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 2rem; 
            background: #f9f9f9; 
            color: #333;
        }
        .container { 
            max-width: 400px; 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }
        button { 
            padding: 12px; 
            font-size: 16px; 
            cursor: pointer; 
            border: none; 
            background: #0070f3; 
            color: white; 
            border-radius: 5px; 
            font-weight: bold;
        }
        button:hover {
            background: #0051a8;
        }
        input { 
            padding: 10px; 
            font-size: 16px; 
            width: 60%; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            text-align: center;
        }
        video { 
            width: 100%; 
            max-width: 800px; 
            border: 2px solid #333; 
            margin-top: 20px; 
            border-radius: 8px; 
            display: none; 
            background: #000;
        }
        #share-info {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            padding: 15px;
            border-radius: 5px;
            max-width: 400px;
            margin: 0 auto 20px auto;
        }
    </style>
</head>
<body>
    <h1>⚡ Live Screen Share</h1>
    
    <div id="setup-area" class="container">
        <button id="share-btn">Share My Screen</button>
        <label style="display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; cursor: pointer;">
            <input type="checkbox" id="record-prefs" style="width: auto;"> Backup / Record this session locally
        </label>
        <hr style="width:100%; border:0; border-top:1px solid #ccc;">
        <div>
            <input type="text" id="code-input" maxlength="8" placeholder="Enter 8-digit code">
            <button id="join-btn" style="background:#000;">Join</button>
        </div>
    </div>

    <div id="share-info" style="display:none;">
        <h2>Your Sharing Code: <span id="display-code" style="color: #0070f3;"></span></h2>
        <p>Give this code to anyone who wants to view your screen.</p>
    </div>

    <video id="screen-video" autoplay playsinline muted controls></video>

    <script>
        // =========================================================
        // ⚠️ CONFIGURATION: PUT YOUR PUSHER KEYS HERE
        // =========================================================
        const PUSHER_KEY = 'd66a4e25293197c52cb4';
        const PUSHER_CLUSTER = 'us2';

        let roomCode = '';
        let isHost = false;
        let peerConnection;
        let channel;

        const pusher = new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER });
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        const videoElem = document.getElementById('screen-video');

        // Signaling transmitter to backend
        async function sendSignal(event, data) {
            await fetch('/api/signal.js', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: roomCode, event, data })
            });
        }

        function initWebRTC(code) {
            roomCode = code;
            channel = pusher.subscribe(`room-${code}`);
            peerConnection = new RTCPeerConnection(rtcConfig);

            // Handle local ICE candidates and relay them via signaling server
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    sendSignal('ice-candidate', { candidate: event.candidate, sender: isHost ? 'host' : 'viewer' });
                }
            };
        }

        // =========================================================
        // HOST LOGIC (The Screen Sharer)
        // =========================================================
        let mediaRecorder;
        let recordedChunks = [];

        document.getElementById('share-btn').onclick = async () => {
            isHost = true;
            const shouldRecord = document.getElementById('record-prefs').checked;
            const generatedCode = Math.floor(10000000 + Math.random() * 90000000).toString();
            initWebRTC(generatedCode);

            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('share-info').style.display = 'block';
            document.getElementById('display-code').innerText = generatedCode;

            try {
                // Capture the screen stream
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                videoElem.srcObject = stream;
                videoElem.style.display = 'inline-block';
                stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));

                // BACKUP RECORDING FEATURE:
                if (shouldRecord) {
                    recordedChunks = [];
                    
                    // Choose supported format (defaulting to webm container, highly compatible with screen records)
                    const options = { mimeType: 'video/webm; codecs=vp9' };
                    mediaRecorder = new MediaRecorder(stream, options);

                    // Collect data chunks as they become available
                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            recordedChunks.push(event.data);
                        }
                    };

                    // Compile and download file automatically when stream ends
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(recordedChunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        
                        // Create a hidden download link and click it programmatically
                        const a = document.createElement('a');
                        a.style.display = 'none';
                        a.href = url;
                        a.download = `ScreenShare-Backup-${generatedCode}.webm`;
                        document.body.appendChild(a);
                        a.click();
                        
                        // Clean up memory
                        setTimeout(() => {
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                        }, 100);
                        alert("Backup recording downloaded successfully!");
                    };

                    // Start recording (slices data every 1 second)
                    mediaRecorder.start(1000);
                }

                // Detect when user clicks browser's built-in "Stop Sharing" button
                stream.getVideoTracks()[0].onended = () => {
                    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                        mediaRecorder.stop();
                    }
                };

            } catch (err) {
                console.error("Failed to acquire screen stream:", err);
                alert("Error sharing screen. Please check browser permissions.");
                return;
            }

            // Host Event Binders
            channel.bind('viewer-ready', async () => {
                if (!isHost) return;
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                sendSignal('sdp-offer', offer);
            });

            channel.bind('sdp-answer', async (data) => {
                if (!isHost) return; 
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
            });

            channel.bind('ice-candidate', async (data) => {
                if (data && data.sender === 'viewer' && data.candidate) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });
        };

        // =========================================================
        // VIEWER LOGIC (The Receiver)
        // =========================================================
        document.getElementById('join-btn').onclick = async () => {
            const input = document.getElementById('code-input').value.trim();
            if (input.length !== 8) return alert('Enter a valid 8-digit code');
            
            isHost = false;
            initWebRTC(input);
            document.getElementById('setup-area').style.display = 'none';

            // Catch incoming stream tracks from the peer
            peerConnection.ontrack = (event) => {
                if (event.streams && event.streams[0]) {
                    videoElem.srcObject = event.streams[0];
                    videoElem.style.display = 'inline-block';
                }
            };

            // Viewer Event Binders
            channel.bind('sdp-offer', async (data) => {
                if (isHost) return; 
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                sendSignal('sdp-answer', answer);
            });

            channel.bind('ice-candidate', async (data) => {
                if (data && data.sender === 'host' && data.candidate) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });

            // Signal to the host room that viewer is connected and listening
            setTimeout(() => sendSignal('viewer-ready', {}), 1200);
        };
    </script>
</body>
</html>
