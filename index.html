<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Live Screen Share & Recorder</title>
    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #090a16;
            --card-bg: rgba(17, 19, 41, 0.65);
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.15);
            --primary: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            --primary-glow: rgba(99, 102, 241, 0.4);
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.3);
            --text: #f8fafc;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body { 
            min-height: 100vh;
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.08) 0px, transparent 50%);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 2.75rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            background: linear-gradient(to bottom, #ffffff 40%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.75rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 500;
        }

        .card { 
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 460px; 
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
            animation: scaleUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .flex-container {
            display: flex; 
            flex-direction: column; 
            gap: 1.75rem; 
        }

        button { 
            width: 100%;
            padding: 16px; 
            font-size: 16px; 
            font-weight: 600;
            cursor: pointer; 
            border: none; 
            border-radius: 14px; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #share-btn {
            background: var(--primary); 
            color: white; 
            box-shadow: 0 4px 20px var(--primary-glow);
        }

        #share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px var(--primary-glow);
            filter: brightness(1.1);
        }

        /* Modern Custom Checkbox Toggle */
        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            color: #94a3b8;
            cursor: pointer;
            user-select: none;
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .checkbox-container:hover {
            border-color: var(--border-hover);
            color: var(--text);
        }

        .checkbox-container input {
            accent-color: #8b5cf6;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 0.25rem 0;
        }
        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
        }
        .divider span {
            position: relative;
            background: #0b0c1b;
            padding: 0 16px;
            font-size: 11px;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .join-group {
            display: flex;
            gap: 12px;
        }

        input[type="text"] { 
            flex: 1;
            padding: 16px; 
            font-size: 18px; 
            background: rgba(5, 5, 10, 0.8);
            border: 1px solid var(--border); 
            border-radius: 14px; 
            text-align: center;
            color: white;
            font-weight: 700;
            letter-spacing: 3px;
            transition: all 0.25s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            background: rgba(5, 5, 10, 0.9);
        }

        #join-btn { 
            width: auto;
            padding: 16px 32px;
            background: #ffffff; 
            color: #020617;
        }

        #join-btn:hover {
            background: #f1f5f9;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 255, 255, 0.1);
        }

        /* Modern Code Box Display */
        #share-info {
            background: rgba(16, 185, 129, 0.04);
            border: 1px solid rgba(16, 185, 129, 0.15);
            padding: 2.5rem;
            border-radius: 28px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: scaleUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #share-info h2 {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        #display-code {
            display: inline-block;
            font-size: 2.75rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 6px;
            margin: 0.5rem 0 1rem 0;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        #share-info p {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.5;
        }

        /* Ultra Premium Video Frame */
        video { 
            width: 100%; 
            max-width: 1100px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            margin-top: 2.5rem; 
            border-radius: 24px; 
            display: none; 
            background: #000000;
            box-shadow: 0 30px 70px -10px rgba(0, 0, 0, 0.9);
            animation: fadeIn 0.6s ease-out;
        }

        /* Animation Keyframes */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Live Screen Share</h1>
        <p class="subtitle">Secure real-time peer-to-peer streaming</p>
    </div>
    
    <div id="setup-area" class="card">
        <div class="flex-container">
            <button id="share-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                Share My Screen
            </button>
            
            <label class="checkbox-container">
                <input type="checkbox" id="record-prefs"> Backup / Record this session locally
            </label>
            
            <div class="divider"><span>or join session</span></div>
            
            <div class="join-group">
                <input type="text" id="code-input" maxlength="8" placeholder="00000000">
                <button id="join-btn">Join</button>
            </div>
        </div>
    </div>

    <div id="share-info" style="display:none;">
        <h2>Room Connection Code</h2>
        <span id="display-code">--------</span>
        <p>Provide this key to the viewer to authorize access to your display feed.</p>
    </div>

    <video id="screen-video" autoplay playsinline muted controls></video>

    <script>
        // =========================================================
        // ⚠️ CONFIGURATION: PUT YOUR PUSHER KEYS HERE
        // =========================================================
        const PUSHER_KEY = 'd66a4e25293197c52cb4';
        const PUSHER_CLUSTER = 'us2';

        let roomCode = '';
        let isHost = false;
        let peerConnection;
        let channel;

        const pusher = new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER });
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        const videoElem = document.getElementById('screen-video');

        // Signaling transmitter to backend
        async function sendSignal(event, data) {
            await fetch('/api/signal.js', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: roomCode, event, data })
            });
        }

        function initWebRTC(code) {
            roomCode = code;
            channel = pusher.subscribe(`room-${code}`);
            peerConnection = new RTCPeerConnection(rtcConfig);

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    sendSignal('ice-candidate', { candidate: event.candidate, sender: isHost ? 'host' : 'viewer' });
                }
            };
        }

        // =========================================================
        // HOST LOGIC (With Automatic Backup Recording)
        // =========================================================
        let mediaRecorder;
        let recordedChunks = [];

        document.getElementById('share-btn').onclick = async () => {
            isHost = true;
            const shouldRecord = document.getElementById('record-prefs').checked;
            const generatedCode = Math.floor(10000000 + Math.random() * 90000000).toString();
            initWebRTC(generatedCode);

            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('share-info').style.display = 'block';
            document.getElementById('display-code').innerText = generatedCode;

            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                videoElem.srcObject = stream;
                videoElem.style.display = 'inline-block';
                stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));

                if (shouldRecord) {
                    recordedChunks = [];
                    const options = { mimeType: 'video/webm; codecs=vp9' };
                    mediaRecorder = new MediaRecorder(stream, options);

                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            recordedChunks.push(event.data);
                        }
                    };

                    mediaRecorder.onstop = () => {
                        if (recordedChunks.length === 0) return;
                        const blob = new Blob(recordedChunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        
                        const a = document.createElement('a');
                        a.style.display = 'none';
                        a.href = url;
                        a.download = `ScreenShare-Backup-${generatedCode}.webm`;
                        document.body.appendChild(a);
                        a.click();
                        
                        setTimeout(() => {
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                        }, 100);
                        alert("Backup recording downloaded successfully!");
                    };

                    mediaRecorder.start(1000);
                }

                stream.getVideoTracks()[0].onended = () => {
                    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                        mediaRecorder.stop();
                    }
                };

            } catch (err) {
                console.error("Failed to acquire screen stream:", err);
                alert("Error sharing screen. Please check browser permissions.");
                return;
            }

            channel.bind('viewer-ready', async () => {
                if (!isHost) return;
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                sendSignal('sdp-offer', offer);
            });

            channel.bind('sdp-answer', async (data) => {
                if (!isHost) return; 
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
            });

            channel.bind('ice-candidate', async (data) => {
                if (data && data.sender === 'viewer' && data.candidate) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });
        };

        // =========================================================
        // VIEWER LOGIC (The Receiver)
        // =========================================================
        document.getElementById('join-btn').onclick = async () => {
            const input = document.getElementById('code-input').value.trim();
            if (input.length !== 8) return alert('Enter a valid 8-digit code');
            
            isHost = false;
            initWebRTC(input);
            document.getElementById('setup-area').style.display = 'none';

            peerConnection.ontrack = (event) => {
                if (event.streams && event.streams[0]) {
                    videoElem.srcObject = event.streams[0];
                    videoElem.style.display = 'inline-block';
                }
            };

            channel.bind('sdp-offer', async (data) => {
                if (isHost) return; 
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                sendSignal('sdp-answer', answer);
            });

            channel.bind('ice-candidate', async (data) => {
                if (data && data.sender === 'host' && data.candidate) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });

            setTimeout(() => sendSignal('viewer-ready', {}), 1200);
        };
    </script>
</body>
</html>
