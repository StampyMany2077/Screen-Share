<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Live Screen Share & Recorder</title>
    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(30, 41, 59, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body { 
            min-height: 100vh;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 2.5rem;
        }

        .card { 
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .flex-container {
            display: flex; 
            flex-direction: column; 
            gap: 1.5rem; 
        }

        button { 
            width: 100%;
            padding: 14px; 
            font-size: 16px; 
            font-weight: 600;
            cursor: pointer; 
            border: none; 
            border-radius: 12px; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        #share-btn {
            background: var(--primary); 
            color: white; 
        }

        #share-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
        }

        /* Styled Custom Checkbox Wrapper */
        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            padding: 4px 0;
        }

        .checkbox-container input {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 0.5rem 0;
        }
        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1;
        }
        .divider span {
            position: relative;
            background: #161936; /* fallback match */
            padding: 0 15px;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            z-index: 2;
        }

        .join-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] { 
            flex: 1;
            padding: 14px; 
            font-size: 16px; 
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--panel-border); 
            border-radius: 12px; 
            text-align: center;
            color: white;
            font-weight: 600;
            letter-spacing: 2px;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        #join-btn { 
            width: auto;
            padding: 14px 28px;
            background: #f8fafc; 
            color: #0f172a;
        }

        #join-btn:hover {
            background: #ffffff;
            transform: translateY(-1px);
        }

        /* Live Room Info Panel */
        #share-info {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 1.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 440px;
            margin-bottom: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        #share-info h2 {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        #display-code {
            display: block;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 4px;
            margin: 0.5rem 0;
        }

        #share-info p {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Optimized Premium Video Player */
        video { 
            width: 100%; 
            max-width: 1000px; 
            border: 1px solid var(--panel-border); 
            margin-top: 1.5rem; 
            border-radius: 20px; 
            display: none; 
            background: #020617;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>

    <h1>Live Screen Share</h1>
    <p class="subtitle">Secure real-time peer-to-peer streaming</p>
    
    <div id="setup-area" class="card">
        <div class="flex-container">
            <button id="share-btn">Share My Screen</button>
            
            <label class="checkbox-container">
                <input type="checkbox" id="record-prefs"> Backup / Record this session locally
            </label>
            
            <div class="divider"><span>or</span></div>
            
            <div class="join-group">
                <input type="text" id="code-input" maxlength="8" placeholder="00000000">
                <button id="join-btn">Join</button>
            </div>
        </div>
    </div>

    <div id="share-info" style="display:none;">
        <h2>Room Connection Code</h2>
        <span id="display-code">--------</span>
        <p>Provide this key to the viewer to authorize access to your display feed.</p>
    </div>

    <video id="screen-video" autoplay playsinline muted controls></video>

    <script>
        // =========================================================
        // ⚠️ CONFIGURATION: PUT YOUR PUSHER KEYS HERE
        // =========================================================
        const PUSHER_KEY = 'd66a4e25293197c52cb4';
        const PUSHER_CLUSTER = 'us2';

        let roomCode = '';
        let isHost = false;
        let peerConnection;
        let channel;

        const pusher = new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER });
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        const videoElem = document.getElementById('screen-video');

        // Signaling transmitter to backend
        async function sendSignal(event, data) {
            await fetch('/api/signal.js', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: roomCode, event, data })
            });
        }

        function initWebRTC(code) {
            roomCode = code;
            channel = pusher.subscribe(`room-${code}`);
            peerConnection = new RTCPeerConnection(rtcConfig);

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    sendSignal('ice-candidate', { candidate: event.candidate, sender: isHost ? 'host' : 'viewer' });
                }
            };
        }

        // =========================================================
        // HOST LOGIC (With Automatic Backup Recording)
        // =========================================================
        let mediaRecorder;
        let recordedChunks = [];

        document.getElementById('share-btn').onclick = async () => {
            isHost = true;
            const shouldRecord = document.getElementById('record-prefs').checked;
            const generatedCode = Math.floor(10000000 + Math.random() * 90000000).toString();
            initWebRTC(generatedCode);

            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('share-info').style.display = 'block';
            document.getElementById('display-code').innerText = generatedCode;

            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                videoElem.srcObject = stream;
                videoElem.style.display = 'inline-block';
                stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));

                if (shouldRecord) {
                    recordedChunks = [];
                    const options = { mimeType: 'video/webm; codecs=vp9' };
                    mediaRecorder = new MediaRecorder(stream, options);

                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            recordedChunks.push(event.data);
                        }
                    };

                    mediaRecorder.onstop = () => {
                        if (recordedChunks.length === 0) return;
                        const blob = new Blob(recordedChunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        
                        const a = document.createElement('a');
                        a.style.display = 'none';
                        a.href = url;
                        a.download = `ScreenShare-Backup-${generatedCode}.webm`;
                        document.body.appendChild(a);
                        a.click();
                        
                        setTimeout(() => {
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                        }, 100);
                        alert("Backup recording downloaded successfully!");
                    };

                    mediaRecorder.start(1000);
                }

                stream.getVideoTracks()[0].onended = () => {
                    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                        mediaRecorder.stop();
                    }
                };

            } catch (err) {
                console.error("Failed to acquire screen stream:", err);
                alert("Error sharing screen. Please check browser permissions.");
                return;
            }

            channel.bind('viewer-ready', async () => {
                if (!isHost) return;
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                sendSignal('sdp-offer', offer);
            });

            channel.bind('sdp-answer', async (data) => {
                if (!isHost) return; 
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
            });

            channel.bind('ice-candidate', async (data) => {
                if (data && data.sender === 'viewer' && data.candidate) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });
        };

        // =========================================================
        // VIEWER LOGIC (The Receiver)
        // =========================================================
        document.getElementById('join-btn').onclick = async () => {
            const input = document.getElementById('code-input').value.trim();
            if (input.length !== 8) return alert('Enter a valid 8-digit code');
            
            isHost = false;
            initWebRTC(input);
            document.getElementById('setup-area').style.display = 'none';

            peerConnection.ontrack = (event) => {
                if (event.streams && event.streams[0]) {
                    videoElem.srcObject = event.streams[0];
                    videoElem.style.display = 'inline-block';
                }
            };

            channel.bind('sdp-offer', async (data) => {
                if (isHost) return; 
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                sendSignal('sdp-answer', answer);
            });

            channel.bind('ice-candidate', async (data) => {
                if (data && data.sender === 'host' && data.candidate) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });

            setTimeout(() => sendSignal('viewer-ready', {}), 1200);
        };
    </script>
</body>
</html>
